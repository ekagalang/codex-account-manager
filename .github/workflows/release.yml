name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger hanya saat push tag seperti v1.0.0, v1.1.0

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        env:
          # Skip code signing
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # GitHub token untuk publish release
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml