name: Build & Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
      - edited

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install icon tools
        run: npm install sharp png-to-ico --no-save

      - name: Generate icons
        run: node assets/create-ico.js

      - name: Resolve version from tag
        id: release_meta
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name != '' && github.event.release.tag_name || github.ref_name }}
        run: |
          TAG="${RELEASE_TAG}"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Expected tag to start with 'v', got: ${TAG}"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync package version with tag
        shell: bash
        env:
          APP_VERSION: ${{ steps.release_meta.outputs.version }}
        run: npm pkg set version="${APP_VERSION}"

      - name: Build and publish to GitHub Releases
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always
